    <rect x="0" y="0" width="390" height="54" rx="0" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><line x1="16" y1="21" x2="34" y2="21" stroke="#1E293B" stroke-width="2"/><line x1="16" y1="26" x2="34" y2="26" stroke="#1E293B" stroke-width="2"/><line x1="16" y1="31" x2="34" y2="31" stroke="#1E293B" stroke-width="2"/><text x="48" y="34" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#1E293B" text-anchor="start">费曼笔记</text><circle cx="363.0" cy="27.0" r="6.0" fill="none" stroke="#1E293B" stroke-width="2"/><circle cx="363.0" cy="27.0" r="2.25" fill="none" stroke="#1E293B" stroke-width="2"/><text x="16" y="92" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="400" fill="#64748B" text-anchor="start">我的笔记 &gt; 计算机网络 &gt; TCP 三次握手</text><rect x="244" y="108" width="126" height="32" rx="6" fill="#2563EB" stroke="#2563EB" stroke-width="1" opacity="1"/><text x="307.0" y="129.0" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">插入模板</text><rect x="12" y="154" width="366" height="666" rx="8" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><rect x="26" y="172" width="338" height="62" rx="5" fill="#EFF6FF" stroke="none" stroke-width="1" opacity="1"/><text x="40" y="192" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#1E293B" text-anchor="start">问题：</text><text x="40" y="216" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">为什么需要三次握手？</text><rect x="26" y="254" width="338" height="62" rx="5" fill="#FFFBEB" stroke="none" stroke-width="1" opacity="1"/><text x="40" y="274" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#1E293B" text-anchor="start">重点：</text><text x="40" y="298" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">确认双方能力。</text><rect x="26" y="336" width="338" height="62" rx="5" fill="#F0FDF4" stroke="none" stroke-width="1" opacity="1"/><text x="40" y="356" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#1E293B" text-anchor="start">解释：</text><text x="40" y="380" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">SYN → SYN+ACK → ACK。</text><rect x="26" y="418" width="338" height="62" rx="5" fill="#ECFEFF" stroke="none" stroke-width="1" opacity="1"/><text x="40" y="438" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#1E293B" text-anchor="start">总结：</text><text x="40" y="462" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">建立可靠连接。</text>
