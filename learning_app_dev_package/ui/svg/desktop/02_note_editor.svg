<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
    <title>笔记编辑器</title>
    <rect width="1440" height="900" fill="#F6F8FC"/>
    <rect x="0" y="0" width="1440" height="54" rx="0" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><line x1="18" y1="20" x2="38" y2="20" stroke="#1E293B" stroke-width="2"/><line x1="18" y1="25" x2="38" y2="25" stroke="#1E293B" stroke-width="2"/><line x1="18" y1="30" x2="38" y2="30" stroke="#1E293B" stroke-width="2"/><text x="58" y="34" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#1E293B" text-anchor="start">知行笔记</text><rect x="575" y="11" width="110" height="32" rx="6" fill="#2563EB" stroke="#2563EB" stroke-width="1" opacity="1"/><text x="630.0" y="32.0" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">费曼笔记</text><rect x="696" y="11" width="110" height="32" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1" opacity="1"/><text x="751.0" y="32.0" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#1E293B" text-anchor="middle">背题刷题</text><circle cx="1398.0" cy="27.0" r="6.666666666666667" fill="none" stroke="#1E293B" stroke-width="2"/><circle cx="1398.0" cy="27.0" r="2.5" fill="none" stroke="#1E293B" stroke-width="2"/><rect x="0" y="54" width="240" height="846" rx="0" fill="#F8FAFC" stroke="#D9E0EA" stroke-width="1" opacity="1"/><rect x="14" y="70" width="212" height="36" rx="8" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><circle cx="33.14" cy="86.14" r="4.760000000000001" fill="none" stroke="#64748B" stroke-width="2"/><line x1="36.54" y1="89.53999999999999" x2="41.3" y2="94.3" stroke="#64748B" stroke-width="2"/><text x="52" y="94" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#64748B" text-anchor="start">搜索目录</text><text x="264" y="88" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#1E293B" text-anchor="start">我的笔记 &gt; 计算机网络 &gt; TCP 三次握手</text><path d="M19 125 h6 l3 3 h8 v8 h-14 z" fill="none" stroke="#64748B" stroke-width="1.8" stroke-linejoin="round"/><text x="40" y="134" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#1E293B" text-anchor="start">我的笔记</text><path d="M39 157 h6 l3 3 h8 v8 h-14 z" fill="none" stroke="#64748B" stroke-width="1.8" stroke-linejoin="round"/><text x="60" y="166" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#1E293B" text-anchor="start">计算机网络</text><rect x="8" y="181" width="224" height="28" rx="5" fill="#EFF6FF" stroke="none" stroke-width="1" opacity="1"/><path d="M62 185 h7 l4 4 v10 h-11 z" fill="none" stroke="#2563EB" stroke-width="1.7"/><line x1="65" y1="193" x2="70" y2="193" stroke="#2563EB" stroke-width="1.5"/><line x1="65" y1="197" x2="70" y2="197" stroke="#2563EB" stroke-width="1.5"/><text x="80" y="198" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#2563EB" text-anchor="start">TCP 三次握手</text><path d="M62 217 h7 l4 4 v10 h-11 z" fill="none" stroke="#64748B" stroke-width="1.7"/><line x1="65" y1="225" x2="70" y2="225" stroke="#64748B" stroke-width="1.5"/><line x1="65" y1="229" x2="70" y2="229" stroke="#64748B" stroke-width="1.5"/><text x="80" y="230" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#1E293B" text-anchor="start">拥塞控制</text><rect x="1180" y="70" width="140" height="34" rx="6" fill="#2563EB" stroke="#2563EB" stroke-width="1" opacity="1"/><text x="1250.0" y="92.0" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">插入费曼模板</text><text x="1338" y="93" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="600" fill="#16A34A" text-anchor="start">已保存</text><rect x="264" y="112" width="1156" height="770" rx="8" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><rect x="292" y="135" width="1088" height="58" rx="5" fill="#EFF6FF" stroke="none" stroke-width="1" opacity="1"/><text x="312" y="158" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1E293B" text-anchor="start">问题：</text><text x="312" y="182" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="400" fill="#1E293B" text-anchor="start">为什么建立 TCP 连接需要三次握手？</text><rect x="292" y="213" width="1088" height="58" rx="5" fill="#FFFBEB" stroke="none" stroke-width="1" opacity="1"/><text x="312" y="236" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1E293B" text-anchor="start">重点：</text><text x="312" y="260" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="400" fill="#1E293B" text-anchor="start">双方需要确认彼此具备发送和接收能力。</text><rect x="292" y="291" width="1088" height="58" rx="5" fill="#F0FDF4" stroke="none" stroke-width="1" opacity="1"/><text x="312" y="314" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1E293B" text-anchor="start">解释：</text><text x="312" y="338" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="400" fill="#1E293B" text-anchor="start">客户端发送 SYN，服务端回复 SYN + ACK，客户端再回复 ACK。</text><rect x="292" y="369" width="1088" height="58" rx="5" fill="#FEF2F2" stroke="none" stroke-width="1" opacity="1"/><text x="312" y="392" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1E293B" text-anchor="start">卡壳点：</text><text x="312" y="416" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="400" fill="#1E293B" text-anchor="start">为什么两次握手不能充分确认连接？</text><rect x="292" y="447" width="1088" height="58" rx="5" fill="#F5F3FF" stroke="none" stroke-width="1" opacity="1"/><text x="312" y="470" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1E293B" text-anchor="start">类比：</text><text x="312" y="494" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="400" fill="#1E293B" text-anchor="start">像两个人打电话，需要确认“我听得到你，你也听得到我”。</text><rect x="292" y="525" width="1088" height="58" rx="5" fill="#ECFEFF" stroke="none" stroke-width="1" opacity="1"/><text x="312" y="548" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1E293B" text-anchor="start">总结：</text><text x="312" y="572" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="400" fill="#1E293B" text-anchor="start">三次握手用于建立可靠的双向通信状态。</text><text x="292" y="668" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1E293B" text-anchor="start">反向链接</text><rect x="292" y="684" width="133" height="24" rx="12" fill="#EFF6FF" stroke="none" stroke-width="1" opacity="1"/><text x="358.5" y="701" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="600" fill="#2563EB" text-anchor="middle">计算机网络复习计划</text>
    </svg>