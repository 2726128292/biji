xt><rect x="300" y="134" width="1060" height="670" rx="12" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><text x="340" y="188" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#1E293B" text-anchor="start">数据安全与备份</text><text x="340" y="224" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#64748B" text-anchor="start">所有数据保存在当前浏览器的 IndexedDB 中。请定期导出完整备份。</text><rect x="340" y="274" width="460" height="166" rx="10" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><text x="356" y="301" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1E293B" text-anchor="start">导出完整备份</text><text x="356" y="325" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="400" fill="#64748B" text-anchor="start">包含笔记、题库、错题本、历史版本、设置与学习记录</text><rect x="370" y="386" width="170" height="36" rx="6" fill="#2563EB" stroke="#2563EB" stroke-width="1" opacity="1"/><text x="455.0" y="409.0" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">导出 JSON / ZIP</text><rect x="840" y="274" width="460" height="166" rx="10" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><text x="856" y="301" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#1E293B" text-anchor="start">恢复备份</text><text x="856" y="325" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="12" font-weight="400" fill="#64748B" text-anchor="start">恢复前会验证版本并提示合并或覆盖</text><rect x="870" y="386" width="150" height="36" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1" opacity="1"/><text x="945.0" y="409.0" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#2563EB" text-anchor="middle">选择备份文件</text><rect