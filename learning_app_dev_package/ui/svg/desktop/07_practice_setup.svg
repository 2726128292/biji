    <rect x="0" y="0" width="1440" height="54" rx="0" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><line x1="18" y1="20" x2="38" y2="20" stroke="#1E293B" stroke-width="2"/><line x1="18" y1="25" x2="38" y2="25" stroke="#1E293B" stroke-width="2"/><line x1="18" y1="30" x2="38" y2="30" stroke="#1E293B" stroke-width="2"/><text x="58" y="34" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#1E293B" text-anchor="start">知行笔记</text><rect x="575" y="11" width="110" height="32" rx="6" fill="#FFFFFF" stroke="#2563EB" stroke-width="1" opacity="1"/><text x="630.0" y="32.0" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#1E293B" text-anchor="middle">费曼笔记</text><rect x="696" y="11" width="110" height="32" rx="6" fill="#2563EB" stroke="#2563EB" stroke-width="1" opacity="1"/><text x="751.0" y="32.0" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">背题刷题</text><circle cx="1398.0" cy="27.0" r="6.666666666666667" fill="none" stroke="#1E293B" stroke-width="2"/><circle cx="1398.0" cy="27.0" r="2.5" fill="none" stroke="#1E293B" stroke-width="2"/><rect x="0" y="54" width="240" height="846" rx="0" fill="#F8FAFC" stroke="#D9E0EA" stroke-width="1" opacity="1"/><rect x="14" y="70" width="212" height="36" rx="8" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><circle cx="33.14" cy="86.14" r="4.760000000000001" fill="none" stroke="#64748B" stroke-width="2"/><line x1="36.54" y1="89.53999999999999" x2="41.3" y2="94.3" stroke="#64748B" stroke-width="2"/><text x="52" y="94" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="400" fill="#64748B" text-anchor="start">搜索目录</text><text x="264" y="88" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#1E293B" text-anchor="start">开始刷题</text><rect x="310" y="108" width="820" height="712" rx="12" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><text x="352" y="156" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700" fill="#1E293B" text-anchor="start">开始刷题</text><text x="352" y="192" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#64748B" text-anchor="start">来源：第一轮不会 · 共 126 道题</text><text x="352" y="238" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#1E293B" text-anchor="start">本次范围</text><text x="372" y="268" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">● 当前题库全部题目</text><text x="372" y="295" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">○ 当前文件夹及子文件夹</text><text x="372" y="322" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">○ 手动选择章节</text><text x="352" y="359" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#1E293B" text-anchor="start">题目顺序</text><text x="372" y="389" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">● 随机顺序</text><text x="372" y="416" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">○ 按原题库顺序</text><text x="352" y="453" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#1E293B" text-anchor="start">不会或答错的题目</text><text x="372" y="483" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">● 加入错题本</text><text x="372" y="510" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">○ 不加入任何错题本</text><text x="352" y="547" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#1E293B" text-anchor="start">目标错题本</text><text x="372" y="577" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">● 新建错题本</text><text x="372" y="604" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">○ 加入已有错题本</text><text x="352" y="645" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#1E293B" text-anchor="start">错题本名称</text><rect x="352" y="662" width="420" height="40" rx="6" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><text x="370" y="688" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="400" fill="#1E293B" text-anchor="start">第二轮不会</text><text x="802" y="688" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#16A34A" text-anchor="start">保持与原题库结构一一对应</text><rect x="864" y="748" width="100" height="38" rx="6" fill="#FFFFFF" stroke="#D9E0EA" stroke-width="1" opacity="1"/><text x="914.0" y="772.0" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#1E293B" text-anchor="middle">取消</text><rect x="980" y="748" width="116" height="38" rx="6" fill="#2563EB" stroke="#2563EB" stroke-width="1" opacity="1"/><text x="1038.0" y="772.0" font-family="'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">开始刷题</text>
